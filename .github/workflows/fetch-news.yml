name: Daily News Fetch

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch and translate news
        run: node scripts/fetch-news.js

      - name: Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/news/
          if git diff --cached --quiet; then
            echo "Keine Änderungen – kein Commit nötig"
          else
            git commit -m "chore: daily news update [skip ci]"
            git push "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          fi
